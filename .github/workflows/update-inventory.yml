name: 每日库存自动更新

on:
  # 手动触发（您点击按钮即可运行）
  workflow_dispatch:
  
  # 每天凌晨 2:00 自动运行
  # 每小时检查一次（备用）
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 * * * *'

jobs:
  update-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install pandas openpyxl
      
      - name: 检查库存表状态
        id: check
        run: |
          if [ -f "data/inventory.xlsx" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            # 检查文件是否在最近1小时内被修改
            if [ $(find data/inventory.xlsx -mmin -60 | wc -l) -gt 0 ]; then
              echo "recent=true" >> $GITHUB_OUTPUT
            else
              echo "recent=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "recent=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 判断是否需要更新
        id: should_update
        run: |
          # 手动触发：总是更新
          # 每天2点：总是更新
          # 每小时：只在文件存在且较新时更新
          TRIGGER="${{ github.event_name }}"
          CRON="${{ github.event.schedule }}"
          
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            echo "reason=手动触发" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 2 * * *" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            echo "reason=每日定时更新（02:00）" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 * * * *" ] && [ "${{ steps.check.outputs.recent }}" = "true" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            echo "reason=每小时检查（文件较新）" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
            echo "reason=不满足更新条件，跳过" >> $GITHUB_OUTPUT
          fi
      
      - name: 更新库存数据
        if: steps.should_update.outputs.update == 'true' && steps.check.outputs.exists == 'true'
        run: python scripts/update_inventory.py data/inventory.xlsx data/products.json
      
      - name: 删除已处理的库存文件
        if: steps.should_update.outputs.update == 'true' && steps.check.outputs.exists == 'true'
        run: |
          # 删除 inventory.xlsx 避免重复更新
          git rm data/inventory.xlsx 2>/dev/null || rm -f data/inventory.xlsx
          # 如果文件被 git 跟踪，尝试暂存删除；否则忽略错误
          git add data/inventory.xlsx 2>/dev/null || true
          echo "已删除 data/inventory.xlsx，避免重复更新"
      
      - name: 提交并推送更新
        if: steps.should_update.outputs.update == 'true'
        run: |
          git config user.name "库存机器人"
          git config user.email "bot@unicom.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "自动更新库存 $(date +%Y-%m-%d %H:%M)"
          git push
